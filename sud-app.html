    // ============================================================
    // ЛОГИКА ПРИЛОЖЕНИЯ

    let currentModule = 0;
    const totalModules = courseData.modules.length;
    let progress = new Array(totalModules).fill(false);

    // Загрузка сохранённого прогресса
    function loadProgress() {
        try {
            const saved = localStorage.getItem('klyuch_course_progress');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length === totalModules) {
                    progress = parsed;
                }
            }
        } catch (e) {}
    }

    function saveProgress() {
        try {
            localStorage.setItem('klyuch_course_progress', JSON.stringify(progress));
        } catch (e) {}
    }

    // Рендеринг
    function render() {
        renderProgressBar();
        renderNavModules();
        renderModule(currentModule);
        updateProgressPercent();
    }

    function renderProgressBar() {
        const container = document.getElementById('progressBar');
        container.innerHTML = '';
        for (let i = 0; i < totalModules; i++) {
            const dot = document.createElement('div');
            dot.className = 'progress-dot';
            if (progress[i]) dot.classList.add('completed');
            if (i === currentModule) dot.classList.add('active');
            dot.addEventListener('click', () => goToModule(i));
            container.appendChild(dot);
        }
    }

    function renderNavModules() {
        const container = document.getElementById('navModules');
        container.innerHTML = '';
        courseData.modules.forEach((mod, i) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            if (i === currentModule) btn.classList.add('active');
            if (progress[i]) btn.classList.add('completed');
            btn.textContent = `М${i+1}`;
            btn.title = mod.title;
            btn.addEventListener('click', () => goToModule(i));
            container.appendChild(btn);
        });
    }

    function renderModule(index) {
        const container = document.getElementById('modulesContainer');
        const mod = courseData.modules[index];
        
        let tasksHtml = '';
        if (mod.tasks && mod.tasks.length > 0) {
            tasksHtml = mod.tasks.map((task, ti) => `
                <div class="task" id="task-${index}-${ti}">
                    <div class="task-title">${task.title}</div>
                    <div class="task-body">
                        <p>${task.prompt}</p>
                        <textarea id="task-input-${index}-${ti}" placeholder="${task.placeholder || 'Введите ваш ответ...'}"></textarea>
                        <div class="task-actions">
                            <button class="task-btn" onclick="checkTask(${index}, ${ti})">✅ Готово</button>
                            <button class="task-btn-hint" onclick="showHint(${index}, ${ti})">💡 Подсказка</button>
                            <button class="task-btn-save" onclick="saveTask(${index}, ${ti})">💾 Сохранить ответ</button>
                        </div>
                        <div class="task-feedback" id="task-feedback-${index}-${ti}"></div>
                    </div>
                </div>
            `).join('');
        }

        let contentHtml = mod.content;

        container.innerHTML = `
            <div class="module active">
                <div class="module-title">${mod.title}</div>
                <div class="module-sub">${mod.subtitle}</div>
                <div class="module-content">
                    ${contentHtml}
                </div>
                ${tasksHtml}
                <div class="module-nav">
                    <button class="btn btn-prev" onclick="goToModule(${index-1})" ${index === 0 ? 'disabled style="opacity:0.4;"' : ''}>← Назад</button>
                    ${index === totalModules - 1 ? `
                        <button class="btn btn-finish" onclick="finishCourse()">🎉 Завершить курс</button>
                    ` : `
                        <button class="btn btn-next" onclick="goToModule(${index+1})">Далее →</button>
                    `}
                </div>
            </div>
        `;

        if (!progress[index]) {
            progress[index] = true;
            saveProgress();
            renderProgressBar();
            renderNavModules();
            updateProgressPercent();
        }

        if (mod.tasks) {
            mod.tasks.forEach((task, ti) => {
                const saved = localStorage.getItem(`task_${index}_${ti}`);
                const textarea = document.getElementById(`task-input-${index}-${ti}`);
                if (saved && textarea) {
                    textarea.value = saved;
                }
                if (textarea) {
                    textarea.addEventListener('input', function() {
                        localStorage.setItem(`task_${index}_${ti}`, this.value);
                    });
                }
            });
        }

        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function goToModule(index) {
        if (index < 0 || index >= totalModules) return;
        currentModule = index;
        render();
        if (!progress[index]) {
            progress[index] = true;
            saveProgress();
            renderProgressBar();
            renderNavModules();
            updateProgressPercent();
        }
    }

    function updateProgressPercent() {
        const done = progress.filter(p => p).length;
        const pct = Math.round((done / totalModules) * 100);
        document.getElementById('progressPercent').textContent = pct;
    }

        const task = mod.tasks[taskIdx];
        const textarea = document.getElementById(`task-input-${moduleIdx}-${taskIdx}`);
        const feedback = document.getElementById(`task-feedback-${moduleIdx}-${taskIdx}`);

        if (!task.hint) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Для этого задания подсказка не подготовлена.';
            return;
        }

        // Заполняем текстовое поле подсказкой
        textarea.value = task.hint;
        textarea.classList.add('hint-filled');

        // Сохраняем в localStorage
        localStorage.setItem(`task_${moduleIdx}_${taskIdx}`, task.hint);

        // Показываем уведомление
        feedback.className = 'task-feedback show hint';
        feedback.textContent = '💡 Подсказка загружена. Это пример правильного ответа. Вы можете отредактировать его под свою ситуацию.';
    }

    // Сохранение ответа в текстовый файл
    function saveTask(moduleIdx, taskIdx) {
        const input = document.getElementById(`task-input-${moduleIdx}-${taskIdx}`);
        const feedback = document.getElementById(`task-feedback-${moduleIdx}-${taskIdx}`);
        const answer = input ? input.value : '';

        if (!answer.trim()) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Поле пустое. Напишите ответ перед сохранением.';
            return;
        }

        const mod = courseData.modules[moduleIdx];
        const task = mod.tasks[taskIdx];
        const date = new Date().toLocaleString('ru-RU');
        
        const content = [
            '═══════════════════════════════════════════',
            `  📝 Ответ на задание: ${task.title}`,
            `  📚 Модуль: ${mod.title}`,
            `  📅 Дата: ${date}`,
            '═══════════════════════════════════════════',
            '',
            '📌 ЗАДАНИЕ:',
            task.prompt,
            '',
            '📝 ОТВЕТ:',
            answer,
            '',
            '═══════════════════════════════════════════',
            '  ✍️ Сохранено с помощью интерактивного курса',
            '  Судебная защита прав на землю',
            '═══════════════════════════════════════════'
        ].join('\n');

        try {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            const filename = `otvet_modul${moduleIdx+1}_zadanie${taskIdx+1}.txt`;
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);

            feedback.className = 'task-feedback show success';
            feedback.textContent = `💾 Ответ сохранён в файл "${filename}"`;
        } catch (e) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '❌ Ошибка сохранения: ' + e.message;
        }
    }

    // Проверка заданий
    function checkTask(moduleIdx, taskIdx) {
        const input = document.getElementById(`task-input-${moduleIdx}-${taskIdx}`);
        const feedback = document.getElementById(`task-feedback-${moduleIdx}-${taskIdx}`);
        const answer = input ? input.value.trim() : '';

        if (answer.length === 0) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Пожалуйста, напишите ответ перед проверкой.';
            return;
        }

        if (answer.length < 10) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Ответ слишком короткий. Попробуйте развернуть мысль.';
            return;
        }

        const taskKey = `task_done_${moduleIdx}_${taskIdx}`;
        localStorage.setItem(taskKey, 'true');

        feedback.className = 'task-feedback show success';
        feedback.textContent = '✅ Сохраните ваш ответ.';
        
        checkModuleCompletion(moduleIdx);
    }

    function checkModuleCompletion(moduleIdx) {
        const mod = courseData.modules[moduleIdx];
        if (!mod.tasks) return;
        
        let allDone = true;
        mod.tasks.forEach((task, ti) => {
            const key = `task_done_${moduleIdx}_${ti}`;
            if (!localStorage.getItem(key)) {
                allDone = false;
            }
        });

        if (allDone && mod.tasks.length > 0) {
            progress[moduleIdx] = true;
            saveProgress();
            renderProgressBar();
            renderNavModules();
            updateProgressPercent();
            
            const feedbacks = document.querySelectorAll(`#task-feedback-${moduleIdx}-0`);
            if (feedbacks.length > 0) {
                const lastFeedback = feedbacks[feedbacks.length - 1];
                if (lastFeedback) {
                    const msg = document.createElement('div');
                    msg.style.marginTop = '12px';
                    msg.style.padding = '12px 16px';
                    msg.style.background = '#dff0df';
                    msg.style.borderRadius = '10px';
                    msg.style.color = '#2a6a3a';
                    msg.style.fontWeight = '600';
                    msg.textContent = '🎉 Все задания модуля выполнены! Вы можете переходить к следующему модулю.';
                    lastFeedback.parentNode.appendChild(msg);
                }
            }
        }
    }

    function finishCourse() {
        const allDone = progress.every(p => p === true);
        if (!allDone) {
            alert('Вы ещё не прошли все модули. Продолжайте изучение!');
            return;
        }

        if (confirm('🎉 Поздравляем! Вы завершили курс "Судебная защита прав на землю".\n\nХотите сбросить прогресс и пройти заново?')) {
            let allAnswers = '';
            for (let m = 0; m < totalModules; m++) {
                const mod = courseData.modules[m];
                if (mod.tasks) {
                    mod.tasks.forEach((task, ti) => {
                        const saved = localStorage.getItem(`task_${m}_${ti}`);
                        if (saved) {
                            allAnswers += `\n--- Модуль ${m+1}, Задание ${ti+1} ---\n${saved}\n`;
                        }
                    });
                }
            }
            if (allAnswers) {
                const blob = new Blob(['ВСЕ ОТВЕТЫ НА КУРС\n' + '='.repeat(40) + '\n' + allAnswers], { type: 'text/plain;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'vse_otvety_kursa.txt';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
            }
            
            localStorage.clear();
            progress = new Array(totalModules).fill(false);
            saveProgress();
            render();
            alert('Прогресс сброшен. Можете начать заново!');
        }
    }

    // ============================================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================================

    loadProgress();
    render();

    console.log('📚 Курс "Судебная защита прав на землю" загружен');
    console.log(`📖 Всего модулей: ${totalModules}`);
    console.log(`📝 Выполнено: ${progress.filter(p => p).length}/${totalModules}`);
</script>

</body>
</html>
