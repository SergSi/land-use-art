title: Практика землепользования
description: землепользование, административные процедуры, земельные споры
subtitle: База знаний землепользователей
location: Москва
date: true
count_post: 6
new_materials_months: 2  # 1, 2 или 3


logo: /assets/img/logo.png

baseurl: ""
# Для постов
permalink: /:categories/:year/:month/:day/:title/

# Для страниц (оставить как есть)
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      permalink: /:path/

author:
  name      : С. И. Ивасюк
  email     : cgles@yandex.ru

social:
  - username: https://t.me/serge_si
  - links: https://t.me/land_use_art

organization:
  name      : Национальный союз землепользователей
  email     : info@nsz.su  

collections:
  info:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post   

# Build settings
exclude: 
  - README.md
  - Gemfile
  - Gemfile.lock
  
markdown: kramdown
urlimg: '/assets/img/'

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

include:
  - assets/img
