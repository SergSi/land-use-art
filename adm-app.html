                        hint: "Пример административного иска:\n\nШапка: В Истринский городской суд Московской области. Истец: Иванов И.И. Ответчик: Администрация г.о. Истра.\n\nВводная: 01.06.2025 я обратился в администрацию с заявлением о перераспределении земельного участка. 10.07.2025 получен отказ № 567.\n\nОписательная: Заявление подано с приложением схемы на КПТ. Отказ мотивирован красными линиями. Однако ППТ для данной территории не разработан (ответ № 123 от 20.06.2025). Жалоба в Министерство отклонена (ответ № 789).\n\nПравовое обоснование: Нарушен п. 2 ст. 42 ГрК РФ — красные линии утверждаются ППТ, который отсутствует. В силу ч. 2 ст. 62 КАС РФ ответчик должен доказать законность отказа.\n\nПросительная часть: 1) Признать решение № 567 незаконным. 2) Обязать администрацию повторно рассмотреть заявление."
                    }
                ]
            }
        ]
    };

    // ============================================================
    // ГЛОССАРИЙ
    // ============================================================

    const glossaryData = [
        { term: "Административный регламент", definition: "Нормативный правовой акт, устанавливающий порядок предоставления государственной или муниципальной услуги. Содержит исчерпывающий перечень документов, оснований для отказа, сроки рассмотрения и требования к форме заявления." },
        { term: "Административный иск", definition: "Исковое заявление, подаваемое в суд по правилам КАС РФ для оспаривания решений, действий или бездействия органов власти. Отличается тем, что обязанность доказывания законности решения лежит на органе власти (ч. 2 ст. 62 КАС РФ)." },
        { term: "Береговая полоса", definition: "Полоса земли вдоль береговой линии водного объекта шириной 20 метров (для рек длиной до 10 км — 5 метров). Находится в федеральной собственности, не подлежит приватизации и огораживанию. Каждый гражданин имеет право свободного доступа." },
        { term: "Бумажная работа", definition: "Система правовых действий, зафиксированных документально. Каждый запрос, заявление или жалоба — юридический акт, инициирующий административные процедуры и формирующий доказательственную базу для суда." },
        { term: "Вид разрешённого использования (ВРИ)", definition: "Характеристика земельного участка, определяющая разрешённые виды деятельности. Устанавливается ПЗЗ и фиксируется в ЕГРН. Примеры: «индивидуальное жилищное строительство», «ведение крестьянско-фермерского хозяйства»." },
        { term: "Водный объект", definition: "Природный или искусственный водоём, водоток либо иной объект с сосредоточением вод. Различаются водотоки (реки — в федеральной собственности) и водоёмы (пруды — могут быть в частной собственности по ст. 8 ВК РФ)." },
        { term: "Водоохранная зона", definition: "Зона с особыми условиями использования территории (ЗОУИТ), устанавливаемая вдоль водных объектов шириной от 50 до 200 метров. В ней запрещены строительство без согласования, использование удобрений и пестицидов, мойка транспорта." },
        { term: "Генеральный план", definition: "Документ территориального планирования, определяющий функциональные зоны, границы населённых пунктов, планируемые дороги и объекты инфраструктуры. Не устанавливает красные линии — это функция ППТ." },
        { term: "Градостроительный план земельного участка (ГПЗУ)", definition: "Документ, содержащий сведения о границах участка, территориальной зоне, градостроительном регламенте, красных линиях, ЗОУИТ. Обязателен для получения разрешения на строительство (ст. 57 ГрК РФ)." },
        { term: "Градостроительный регламент", definition: "Совокупность правил для территориальной зоны: виды разрешённого использования, предельные параметры строительства (высота, отступы, процент застройки), ограничения. Содержится в ПЗЗ." },
        { term: "Дачная амнистия", definition: "Упрощённый порядок регистрации прав на земельные участки и дома, предоставленные до введения ЗК РФ (до 1998–2001 годов). Позволяет оформить право без разрешения на строительство. Основание — ФЗ № 137-ФЗ." },
        { term: "Досудебное обжалование", definition: "Подача жалобы в вышестоящий орган до обращения в суд. Для большинства споров с органами власти является обязательным условием принятия иска (ст. 218 КАС РФ). Позволяет разрешить спор без суда или сформировать доказательственную базу." },
        { term: "Жалоба", definition: "Письменное обращение в вышестоящий орган или прокуратуру с требованием отменить незаконное решение или признать бездействие незаконным. Содержит: реквизиты акта, ссылки на нормы, чёткое требование." },
        { term: "Заявление", definition: "Письменное обращение в орган власти, инициирующее административную процедуру. В отличие от «письма с просьбой» имеет правовую силу и обязывает должностное лицо действовать по регламенту." },
        { term: "Запрос", definition: "Письменное обращение с требованием предоставить информацию. Правовое основание — ФЗ № 59-ФЗ (срок ответа 30 дней). Ответ (включая отписку) приобретает доказательственную силу в суде." },
        { term: "Землепользование", definition: "Совокупность всех земель и объектов, которые лицо фактически использует. Не ограничивается зарегистрированным участком и включает арендованные поля, лесные и водные объекты, земли без образования участка, сервитуты." },
        { term: "Зоны с особыми условиями использования территории (ЗОУИТ)", definition: "Охранные, санитарно-защитные, водоохранные зоны, зоны затопления с ограничениями на деятельность. Многие ЗОУИТ не внесены в ЕГРН — их наличие проверяется запросами в эксплуатирующие организации." },
        { term: "Кадастровый инженер", definition: "Специалист с квалификационным аттестатом на кадастровую деятельность. Выполняет межевание, подготавливает межевые и технические планы, акты обследования, схемы расположения на КПТ." },
        { term: "Категория земель", definition: "Правовой статус территории, определяющий целевое назначение. Категории: земли населённых пунктов, сельхозназначения, промышленности, лесного фонда, водного фонда, особо охраняемых территорий, запаса." },
        { term: "Кодекс административного судопроизводства (КАС РФ)", definition: "Процессуальный закон для споров граждан с органами власти. Главная особенность — ч. 2 ст. 62: обязанность доказывания законности действий лежит на органе власти." },
        { term: "Конвейер «Запрос → Заявление → Жалоба → Иск»", definition: "Последовательность действий подготовленного заявителя при взаимодействии с органами власти по вопросам землепользования. Каждый шаг оставляет документальный след и повышает цену неправомерных действий для должностного лица." },
        { term: "Красные линии", definition: "Границы, отделяющие территории общего пользования (дороги, тротуары, парки) от территорий застройки. Утверждаются ППТ. Строительство за красными линиями запрещено (ст. 42 ГрК РФ)." },
        { term: "Негаторный иск", definition: "Иск собственника об устранении нарушений, не связанных с лишением владения (например, сосед перегородил проезд). Рассматривается по ГПК РФ или АПК РФ в зависимости от субъектного состава." },
        { term: "Неразграниченные земли", definition: "Земли, не переданные ни в частную, ни в муниципальную собственность. Находятся в государственной собственности, распоряжение осуществляет администрация. Могут быть предоставлены в аренду или собственность." },
        { term: "Объект капитального строительства (ОКС)", definition: "Здание, строение, сооружение с прочной связью с землёй. Для возведения требуется разрешение на строительство, для завершённого объекта — регистрация права в ЕГРН." },
        { term: "Переворот бремени доказывания", definition: "Ключевой принцип КАС РФ (ч. 2 ст. 62): обязанность доказывания законности решений органов власти возлагается на орган власти, а не на заявителя. Заявитель не обязан доказывать незаконность решения чиновника." },
        { term: "Перераспределение земельных участков", definition: "Правовой механизм присоединения к частному участку прилегающей государственной или муниципальной земли либо перераспределения границ между смежными участками. Основание — ст. 39.27–39.29 ЗК РФ." },
        { term: "Правила землепользования и застройки (ПЗЗ)", definition: "Документ градостроительного зонирования, утверждаемый муниципалитетом. Содержит карту территориальных зон и градостроительные регламенты. Основной источник сведений о градостроительных ограничениях." },
        { term: "Предварительное согласование", definition: "Административная процедура, предшествующая предоставлению участка в аренду или собственность. Включает утверждение схемы расположения на КПТ. Основание — ст. 39.15 ЗК РФ." },
        { term: "Проект планировки территории (ППТ)", definition: "Документ, устанавливающий красные линии, зоны размещения объектов, транспортную инфраструктуру. Именно ППТ, а не генплан, утверждает красные линии (ст. 42 ГрК РФ)." },
        { term: "Публичный сервитут", definition: "Право ограниченного пользования чужим участком для государственных или муниципальных нужд (проход, проезд, прокладка коммуникаций). Устанавливается решением органа власти (ст. 23 ЗК РФ)." },
        { term: "Самовольная постройка", definition: "Объект, возведённый на участке, не предоставленном в установленном порядке, или без разрешения, или с нарушением норм. Подлежит сносу за счёт застройщика (ст. 222 ГК РФ)." },
        { term: "Сервитут", definition: "Право ограниченного пользования чужим участком. Частный — по соглашению или решению суда. Публичный — решением органа власти (ст. 23 ЗК РФ, ст. 274 ГК РФ)." },
        { term: "Схема расположения на КПТ (СПЗУ)", definition: "Графический документ, подготавливаемый кадастровым инженером, отображающий границы образуемого участка. Является обязательным приложением к заявлению о предварительном согласовании." },
        { term: "Территориальная зона", definition: "Зона на карте ПЗЗ, для которой установлен градостроительный регламент. Типы: жилые (Ж-1), общественно-деловые (О-1), производственные (П-1), сельхоз (СХ-1), рекреационные (Р-1), инфраструктурные (И-1)." },
        { term: "Территории общего пользования", definition: "Территории с бесплатным доступом неограниченного круга лиц: дороги, тротуары, парки, скверы, набережные, пляжи. Не принадлежат частным лицам." },
        { term: "Федеральный закон № 59-ФЗ", definition: "ФЗ от 02.05.2006 «О порядке рассмотрения обращений граждан». Устанавливает право на письменное обращение в госорганы, 30-дневный срок ответа, право на обжалование бездействия." },
        { term: "Федеральный закон № 210-ФЗ", definition: "ФЗ от 27.07.2010 «Об организации предоставления государственных и муниципальных услуг». Закрепляет принцип «одного окна», порядок досудебного обжалования." },
        { term: "Частный сервитут", definition: "Право ограниченного пользования соседним участком для прохода, проезда, прокладки коммуникаций. Устанавливается по соглашению или решением суда (ст. 23 ЗК РФ, ст. 274 ГК РФ)." },
        { term: "Элементы землепользования", definition: "Семь типов объектов, входящих в землепользование: 1) земельные участки, 2) земли без образования участка, 3) территории общего пользования, 4) неразграниченные земли, 5) лесные участки, 6) транспортные коридоры, 7) водные объекты." }
    ];

    // ============================================================
    // ЛОГИКА ПРИЛОЖЕНИЯ
    // ============================================================

    let currentModule = 0;
    const totalModules = courseData.modules.length;
    let progress = new Array(totalModules).fill(false);

    // Загрузка сохранённого прогресса
    function loadProgress() {
        try {
            const saved = localStorage.getItem('admin_course_progress');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length === totalModules) {
                    progress = parsed;
                }
            }
        } catch (e) {}
    }

    function saveProgress() {
        try {
            localStorage.setItem('admin_course_progress', JSON.stringify(progress));
        } catch (e) {}
    }

    // Рендеринг
    function render() {
        renderProgressBar();
        renderNavModules();
        renderModule(currentModule);
        updateProgressPercent();
        renderGlossaryCount();
    }

    function renderProgressBar() {
        const container = document.getElementById('progressBar');
        container.innerHTML = '';
        for (let i = 0; i < totalModules; i++) {
            const dot = document.createElement('div');
            dot.className = 'progress-dot';
            if (progress[i]) dot.classList.add('completed');
            if (i === currentModule) dot.classList.add('active');
            dot.addEventListener('click', () => showModule(i));
            container.appendChild(dot);
        }
    }

    function renderNavModules() {
        const container = document.getElementById('navModules');
        // Удаляем старые кнопки модулей, оставляя только кнопку глоссария
        const glossaryBtn = container.querySelector('.glossary-btn');
        container.innerHTML = '';
        courseData.modules.forEach((mod, i) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            if (i === currentModule) btn.classList.add('active');
            if (progress[i]) btn.classList.add('completed');
            btn.textContent = `М${i+1}`;
            btn.title = mod.title;
            btn.addEventListener('click', () => showModule(i));
            container.appendChild(btn);
        });
        // Добавляем кнопку глоссария
        const btn = document.createElement('button');
        btn.className = 'nav-btn glossary-btn';
        btn.textContent = '📖 Глоссарий';
        btn.addEventListener('click', showGlossary);
        container.appendChild(btn);
    }

    function renderModule(index) {
        const container = document.getElementById('modulesContainer');
        const mod = courseData.modules[index];
        
        let tasksHtml = '';
        if (mod.tasks && mod.tasks.length > 0) {
            tasksHtml = mod.tasks.map((task, ti) => `
                <div class="task" id="task-${index}-${ti}">
                    <div class="task-title">${task.title}</div>
                    <div class="task-body">
                        <p>${task.prompt}</p>
                        <textarea id="task-input-${index}-${ti}" placeholder="${task.placeholder || 'Введите ваш ответ...'}"></textarea>
                        <div class="task-actions">
                            <button class="task-btn" onclick="checkTask(${index}, ${ti})">✅ Готово</button>
                            <button class="task-btn-hint" onclick="showHint(${index}, ${ti})">💡 Подсказка</button>
                            <button class="task-btn-save" onclick="saveTask(${index}, ${ti})">💾 Сохранить ответ</button>
                        </div>
                        <div class="task-feedback" id="task-feedback-${index}-${ti}"></div>
                    </div>
                </div>
            `).join('');
        }

        let contentHtml = mod.content;

        container.innerHTML = `
            <div class="module active">
                <div class="module-title">${mod.title}</div>
                <div class="module-sub">${mod.subtitle}</div>
                <div class="module-content">
                    ${contentHtml}
                </div>
                ${tasksHtml}
                <div class="module-nav">
                    <button class="btn btn-prev" onclick="showModule(${index-1})" ${index === 0 ? 'disabled style="opacity:0.4;"' : ''}>← Назад</button>
                    ${index === totalModules - 1 ? `
                        <button class="btn btn-finish" onclick="finishCourse()">🎉 Завершить курс</button>
                    ` : `
                        <button class="btn btn-next" onclick="showModule(${index+1})">Далее →</button>
                    `}
                </div>
            </div>
        `;

        // Скрываем глоссарий
        document.getElementById('glossarySection').classList.remove('active');

        // Отмечаем модуль как просмотренный
        if (!progress[index]) {
            progress[index] = true;
            saveProgress();
            renderProgressBar();
            renderNavModules();
            updateProgressPercent();
        }

        // Восстанавливаем сохранённые ответы
        if (mod.tasks) {
            mod.tasks.forEach((task, ti) => {
                const saved = localStorage.getItem(`admin_task_${index}_${ti}`);
                const textarea = document.getElementById(`task-input-${index}-${ti}`);
                if (saved && textarea) {
                    textarea.value = saved;
                }
                if (textarea) {
                    textarea.addEventListener('input', function() {
                        localStorage.setItem(`admin_task_${index}_${ti}`, this.value);
                    });
                }
            });
        }

        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showModule(index) {
        if (index < 0 || index >= totalModules) return;
        currentModule = index;
        render();
        if (!progress[index]) {
            progress[index] = true;
            saveProgress();
            renderProgressBar();
            renderNavModules();
            updateProgressPercent();
        }
    }

    function updateProgressPercent() {
        const done = progress.filter(p => p).length;
        const pct = Math.round((done / totalModules) * 100);
        document.getElementById('progressPercent').textContent = pct;
    }

    function renderGlossaryCount() {
        document.getElementById('glossaryCount').textContent = glossaryData.length;
        document.getElementById('glossaryCountDisplay').textContent = `Всего терминов: ${glossaryData.length}`;
    }

    // ============================================================
    // ГЛОССАРИЙ
    // ============================================================

    function showGlossary() {
        // Скрываем модули
        document.querySelectorAll('.module').forEach(el => el.classList.remove('active'));
        document.getElementById('modulesContainer').innerHTML = '';
        
        // Показываем глоссарий
        const section = document.getElementById('glossarySection');
        section.classList.add('active');
        
        // Снимаем активность с кнопок модулей
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.progress-dot').forEach(dot => dot.classList.remove('active'));
        
        renderGlossaryList();
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderGlossaryList(filter) {
        const container = document.getElementById('glossaryList');
        const search = filter || document.getElementById('glossarySearch').value || '';
        const filtered = glossaryData.filter(item => 
            item.term.toLowerCase().includes(search.toLowerCase()) ||
            item.definition.toLowerCase().includes(search.toLowerCase())
        );
        
        container.innerHTML = filtered.map((item, index) => `
            <div class="glossary-item" id="glossary-item-${index}">
                <div class="term" onclick="toggleGlossaryTerm(${index})">
                    ${item.term}
                    <button class="term-toggle">▼</button>
                </div>
                <div class="definition" id="glossary-def-${index}">
                    ${item.definition}
                </div>
            </div>
        `).join('');
    }

    function filterGlossary(value) {
        renderGlossaryList(value);
    }

    function toggleGlossaryTerm(index) {
        const def = document.getElementById(`glossary-def-${index}`);
        if (def) {
            def.classList.toggle('open');
            const btn = document.querySelector(`#glossary-item-${index} .term-toggle`);
            if (btn) btn.textContent = def.classList.contains('open') ? '▲' : '▼';
        }
    }

    // ============================================================
    // ЗАДАНИЯ
    // ============================================================

    function showHint(moduleIdx, taskIdx) {
        const mod = courseData.modules[moduleIdx];
        const task = mod.tasks[taskIdx];
        const textarea = document.getElementById(`task-input-${moduleIdx}-${taskIdx}`);
        const feedback = document.getElementById(`task-feedback-${moduleIdx}-${taskIdx}`);

        if (!task.hint) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Для этого задания подсказка не подготовлена.';
            return;
        }

        textarea.value = task.hint;
        textarea.style.background = '#fef9e7';
        textarea.style.borderColor = '#f39c12';

        feedback.className = 'task-feedback show hint';
        feedback.textContent = '💡 Подсказка загружена. Это пример правильного ответа. Вы можете отредактировать его под свою ситуацию.';

        localStorage.setItem(`admin_task_${moduleIdx}_${taskIdx}`, task.hint);
    }

    function saveTask(moduleIdx, taskIdx) {
        const input = document.getElementById(`task-input-${moduleIdx}-${taskIdx}`);
        const feedback = document.getElementById(`task-feedback-${moduleIdx}-${taskIdx}`);
        const answer = input ? input.value : '';

        if (!answer.trim()) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Поле пустое. Напишите ответ перед сохранением.';
            return;
        }

        const mod = courseData.modules[moduleIdx];
        const task = mod.tasks[taskIdx];
        const date = new Date().toLocaleString('ru-RU');
        
        const content = [
            '═══════════════════════════════════════════',
            `  📝 Ответ на задание: ${task.title}`,
            `  📚 Модуль: ${mod.title}`,
            `  📅 Дата: ${date}`,
            '═══════════════════════════════════════════',
            '',
            '📌 ЗАДАНИЕ:',
            task.prompt,
            '',
            '📝 ОТВЕТ:',
            answer,
            '',
            '═══════════════════════════════════════════',
            '  ✍️ Сохранено с помощью интерактивного курса',
            '  Административные процедуры в землепользовании',
            '═══════════════════════════════════════════'
        ].join('\n');

        try {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            const filename = `otvet_modul${moduleIdx+1}_zadanie${taskIdx+1}.txt`;
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);

            feedback.className = 'task-feedback show success';
            feedback.textContent = `💾 Ответ сохранён в файл "${filename}"`;
        } catch (e) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '❌ Ошибка сохранения: ' + e.message;
        }
    }

    function checkTask(moduleIdx, taskIdx) {
        const input = document.getElementById(`task-input-${moduleIdx}-${taskIdx}`);
        const feedback = document.getElementById(`task-feedback-${moduleIdx}-${taskIdx}`);
        const answer = input ? input.value.trim() : '';

        if (answer.length === 0) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Пожалуйста, напишите ответ перед проверкой.';
            return;
        }

        if (answer.length < 10) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Ответ слишком короткий. Попробуйте развернуть мысль.';
            return;
        }

        const taskKey = `admin_task_done_${moduleIdx}_${taskIdx}`;
        localStorage.setItem(taskKey, 'true');

        feedback.className = 'task-feedback show success';
        feedback.textContent = '✅ Сохраните ваш ответ.';
        
        checkModuleCompletion(moduleIdx);
    }

    function checkModuleCompletion(moduleIdx) {
        const mod = courseData.modules[moduleIdx];
        if (!mod.tasks) return;
        
        let allDone = true;
        mod.tasks.forEach((task, ti) => {
            const key = `admin_task_done_${moduleIdx}_${ti}`;
            if (!localStorage.getItem(key)) {
                allDone = false;
            }
        });

        if (allDone && mod.tasks.length > 0) {
            progress[moduleIdx] = true;
            saveProgress();
            renderProgressBar();
            renderNavModules();
            updateProgressPercent();
            
            const feedbacks = document.querySelectorAll(`#task-feedback-${moduleIdx}-0`);
            if (feedbacks.length > 0) {
                const lastFeedback = feedbacks[feedbacks.length - 1];
                if (lastFeedback) {
                    const msg = document.createElement('div');
                    msg.style.marginTop = '12px';
                    msg.style.padding = '12px 16px';
                    msg.style.background = '#dff0df';
                    msg.style.borderRadius = '10px';
                    msg.style.color = '#2a6a3a';
                    msg.style.fontWeight = '600';
                    msg.textContent = '🎉 Все задания модуля выполнены! Вы можете переходить к следующему модулю.';
                    lastFeedback.parentNode.appendChild(msg);
                }
            }
        }
    }

    function finishCourse() {
        const allDone = progress.every(p => p === true);
        if (!allDone) {
            alert('Вы ещё не прошли все модули. Продолжайте изучение!');
            return;
        }

        if (confirm('🎉 Поздравляем! Вы завершили курс "Административные процедуры в землепользовании".\n\nХотите сбросить прогресс и пройти заново?')) {
            let allAnswers = '';
            for (let m = 0; m < totalModules; m++) {
                const mod = courseData.modules[m];
                if (mod.tasks) {
                    mod.tasks.forEach((task, ti) => {
                        const saved = localStorage.getItem(`admin_task_${m}_${ti}`);
                        if (saved) {
                            allAnswers += `\n--- Модуль ${m+1}, Задание ${ti+1} ---\n${saved}\n`;
                        }
                    });
                }
            }
            if (allAnswers) {
                const blob = new Blob(['ВСЕ ОТВЕТЫ НА КУРС\n' + '='.repeat(40) + '\n' + allAnswers], { type: 'text/plain;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'vse_otvety_admin_kursa.txt';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
            }
            
            localStorage.clear();
            progress = new Array(totalModules).fill(false);
            saveProgress();
            render();
            alert('Прогресс сброшен. Можете начать заново!');
        }
    }

    // ============================================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================================

    loadProgress();
    render();

    console.log('📚 Курс "Административные процедуры в землепользовании" загружен');
    console.log(`📖 Всего модулей: ${totalModules}`);
    console.log(`📝 Выполнено: ${progress.filter(p => p).length}/${totalModules}`);
    console.log(`📖 Глоссарий: ${glossaryData.length} терминов`);
</script>

</body>
</html>
