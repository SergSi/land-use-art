                        <li><strong>Конфликт между членами кооператива</strong> — решение: регламент пользования общим имуществом</li>
                    </ul>

                    <div class="success-box">
                        <strong>Правовая основа для защиты:</strong>
                        <ul>
                            <li>Ст. 14 ФЗ № 217-ФЗ — имущество общего пользования принадлежит кооперативу</li>
                            <li>Ст. 301, 304 ГК РФ — виндикационный и негаторный иски</li>
                        </ul>
                    </div>
                `,
                tasks: [
                    {
                        title: "📝 Задание. Анализ кооперативной ситуации",
                        prompt: "Опишите ситуацию в вашем СНТ или кооперативе (реальную или смоделированную). Определите тип проблемы и предложите решение с использованием правовых механизмов.",
                        placeholder: "Ситуация: ...\nТип проблемы: ...\nПравовое основание: ...\nПредлагаемое решение: ...",
                        hint: "Пример: В нашем СНТ председатель оформил дороги общего пользования на себя. Проблема: незаконное оформление земель общего пользования. Основание: ст. 14 ФЗ № 217-ФЗ. Решение: иск о признании права общей долевой собственности и истребовании имущества."
                    }
                ]
            }
        ]
    };

    // ============================================================
    // ГЛОССАРИЙ
    // ============================================================

    const glossaryData = [
        { term: "Анти-манифест", definition: "Перечень проектных табу, которые сознательно исключаются из среды. В отличие от обычного манифеста (декларирующего ценности), анти-манифест определяет границы через запреты, что психологически эффективнее для проектной команды и будущих резидентов." },
        { term: "Береговая полоса", definition: "Полоса земли вдоль береговой линии водного объекта шириной 20 метров (для рек длиной до 10 км — 5 метров). Находится в федеральной собственности, не подлежит приватизации и огораживанию." },
        { term: "Безвозмездное пользование", definition: "Право пользования земельным участком без внесения платы на установленный законом срок. Предоставляется отдельным категориям лиц: гражданам для ИЖС (до 6 лет), НКО (до 10 лет)." },
        { term: "Вид разрешённого использования (ВРИ)", definition: "Характеристика земельного участка, определяющая разрешённые виды деятельности. Устанавливается ПЗЗ и фиксируется в ЕГРН. Примеры: «ИЖС», «ведение КФХ», «магазины»." },
        { term: "Водный объект", definition: "Природный или искусственный водоём, водоток либо иной объект с сосредоточением вод. Различаются водотоки (реки — федеральная собственность) и водоёмы (пруды — частная собственность по ст. 8 ВК РФ)." },
        { term: "Водоохранная зона", definition: "Зона с особыми условиями использования территории (ЗОУИТ), устанавливаемая вдоль водных объектов шириной от 50 до 200 метров. В ней запрещены строительство без согласования, использование удобрений и пестицидов." },
        { term: "Генеральный план", definition: "Документ территориального планирования, определяющий функциональные зоны, границы населённых пунктов, планируемые дороги и объекты инфраструктуры. Не устанавливает красные линии — это функция ППТ." },
        { term: "Градостроительный план земельного участка (ГПЗУ)", definition: "Документ, содержащий сведения о границах участка, территориальной зоне, градостроительном регламенте, красных линиях, ЗОУИТ. Обязателен для получения разрешения на строительство (ст. 57 ГрК РФ)." },
        { term: "Градостроительный регламент", definition: "Совокупность правил для территориальной зоны: виды разрешённого использования, предельные параметры строительства (высота, отступы, процент застройки), ограничения. Содержится в ПЗЗ." },
        { term: "Дачная амнистия", definition: "Упрощённый порядок регистрации прав на земельные участки и дома, предоставленные до введения ЗК РФ (до 1998–2001 годов). Позволяет оформить право без разрешения на строительство (ФЗ № 137-ФЗ, ФЗ № 218-ФЗ)." },
        { term: "Договор водопользования", definition: "Документ, дающий право на забор воды из рек и озёр в коммерческих целях (для орошения, рыбоводства). Срок — до 20 лет. Не требуется для пруда в границах собственного участка (ст. 8 ВК РФ)." },
        { term: "Земельный налог", definition: "Местный налог, уплачиваемый собственниками земельных участков. Ставка: 0,3% для сельхозземель и земель под ИЖС/ЛПХ/садоводство; 1,5% для коммерческих ВРИ и прочих." },
        { term: "Земли без образования участка", definition: "Земли, используемые для размещения некапитальных объектов (киосков, кафе), для сенокошения, выпаса скота, без регистрации права на отдельный участок." },
        { term: "Землепользование", definition: "Совокупность всех земель и объектов, которые лицо фактически использует. Не ограничивается зарегистрированным участком и включает арендованные поля, лесные и водные объекты, земли без образования участка, сервитуты." },
        { term: "Зоны с особыми условиями использования (ЗОУИТ)", definition: "Охранные, санитарно-защитные, водоохранные зоны, зоны затопления с ограничениями на деятельность. Многие ЗОУИТ не внесены в ЕГРН." },
        { term: "Имущество общего пользования СНТ", definition: "Дороги, проезды, детские площадки, инженерные сети, административные здания — принадлежат кооперативу на праве собственности (ст. 14 ФЗ № 217-ФЗ). Не могут быть в частной собственности." },
        { term: "Кадастровый инженер", definition: "Специалист с квалификационным аттестатом на кадастровую деятельность. Выполняет межевание, подготавливает межевые и технические планы, акты обследования, схемы расположения на КПТ." },
        { term: "Категория земель", definition: "Правовой статус территории, определяющий целевое назначение. Категории: земли населённых пунктов, сельхозназначения, промышленности, лесного фонда, водного фонда, особо охраняемых территорий." },
        { term: "Класс пригодности участка", definition: "Оценка участка по шкале А-Г: А (пригоден), Б (пригоден с ограничениями), В (условно пригоден), Г (непригоден). Определяет стратегию освоения." },
        { term: "Кооператив", definition: "Добровольное объединение граждан или юридических лиц на основе членства для совместной деятельности, направленной на удовлетворение материальных и иных потребностей членов (ст. 123.2 ГК РФ)." },
        { term: "Красные линии", definition: "Границы, отделяющие территории общего пользования (дороги, тротуары, парки) от территорий застройки. Утверждаются ППТ. Строительство за красными линиями запрещено." },
        { term: "Льготы при приобретении земли", definition: "Преференции для отдельных категорий: бесплатное предоставление, льготная аренда (0,01%), налоговые льготы, упрощённое оформление. Для многодетных, участников СВО, фермеров, пенсионеров." },
        { term: "Нейрокомфорт", definition: "Свойство среды снижать эмоциональную нагрузку и когнитивное утомление. Достигается через природную палитру, визуальное скольжение, акустический комфорт, природные ароматы." },
        { term: "Неразграниченные земли", definition: "Земли, не переданные ни в частную, ни в муниципальную собственность. Находятся в государственной собственности, распоряжение осуществляет администрация." },
        { term: "Перераспределение земельных участков", definition: "Правовой механизм присоединения к частному участку прилегающей государственной или муниципальной земли либо перераспределения границ между смежными участками (ст. 39.27–39.29 ЗК РФ)." },
        { term: "Правила землепользования и застройки (ПЗЗ)", definition: "Документ градостроительного зонирования, утверждаемый муниципалитетом. Содержит карту территориальных зон и градостроительные регламенты." },
        { term: "Предварительное согласование", definition: "Административная процедура, предшествующая предоставлению участка в аренду или собственность. Включает утверждение схемы расположения на КПТ (ст. 39.15 ЗК РФ)." },
        { term: "Проект планировки территории (ППТ)", definition: "Документ, устанавливающий красные линии, зоны размещения объектов, транспортную инфраструктуру. Именно ППТ, а не генплан, утверждает красные линии." },
        { term: "Публичный сервитут", definition: "Право ограниченного пользования чужим участком для государственных или муниципальных нужд (проход, проезд, прокладка коммуникаций). Устанавливается без согласия правообладателя." },
        { term: "Самовольная постройка", definition: "Объект, возведённый на участке, не предоставленном в установленном порядке, или без разрешения, или с нарушением норм. Подлежит сносу за счёт застройщика (ст. 222 ГК РФ)." },
        { term: "Сервитут", definition: "Право ограниченного пользования чужим участком. Частный — по соглашению или решению суда. Публичный — решением органа власти (ст. 23 ЗК РФ, ст. 274 ГК РФ)." },
        { term: "Схема расположения на КПТ (СПЗУ)", definition: "Графический документ, подготавливаемый кадастровым инженером, отображающий границы образуемого участка. Обязательное приложение к заявлению о предварительном согласовании." },
        { term: "Территориальная зона", definition: "Зона на карте ПЗЗ, для которой установлен градостроительный регламент. Типы: жилые (Ж-1), общественно-деловые (О-1), производственные (П-1), сельхоз (СХ-1), рекреационные (Р-1)." },
        { term: "Территории общего пользования", definition: "Территории с бесплатным доступом неограниченного круга лиц: дороги, тротуары, парки, скверы, набережные, пляжи. Не принадлежат частным лицам." },
        { term: "Условно разрешённый ВРИ", definition: "Вид использования, который не является основным для территориальной зоны, но может быть разрешён при соблюдении условий. Требует публичных слушаний (ст. 39 ГрК РФ)." },
        { term: "Федеральный закон № 217-ФЗ", definition: "Закон «О ведении гражданами садоводства и огородничества». Регулирует создание и деятельность СНТ и ОНТ, имущество общего пользования, «дачную амнистию»." },
        { term: "Элементы землепользования", definition: "Семь типов объектов, входящих в землепользование: 1) земельные участки, 2) земли без образования участка, 3) территории общего пользования, 4) неразграниченные земли, 5) лесные участки, 6) транспортные коридоры, 7) водные объекты." },
        { term: "Эмоциональная карта", definition: "Метод зонирования территории не по функциональным типам, а по психоэмоциональным состояниям: зоны «Тишина и покой», «Созидательное соприкосновение», «Дикая природа», «Технологический хаб»." }
    ];

    // ============================================================
    // ЛОГИКА ПРИЛОЖЕНИЯ
    // ============================================================

    let currentModule = 0;
    const totalModules = courseData.modules.length;
    let progress = new Array(totalModules).fill(false);

    // Загрузка сохранённого прогресса
    function loadProgress() {
        try {
            const saved = localStorage.getItem('zem_course_progress');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length === totalModules) {
                    progress = parsed;
                }
            }
        } catch (e) {}
    }

    function saveProgress() {
        try {
            localStorage.setItem('zem_course_progress', JSON.stringify(progress));
        } catch (e) {}
    }

    // Рендеринг
    function render() {
        renderProgressBar();
        renderNavModules();
        renderModule(currentModule);
        updateProgressPercent();
        renderGlossaryCount();
    }

    function renderProgressBar() {
        const container = document.getElementById('progressBar');
        container.innerHTML = '';
        for (let i = 0; i < totalModules; i++) {
            const dot = document.createElement('div');
            dot.className = 'progress-dot';
            if (progress[i]) dot.classList.add('completed');
            if (i === currentModule) dot.classList.add('active');
            dot.addEventListener('click', () => showModule(i));
            container.appendChild(dot);
        }
    }

    function renderNavModules() {
        const container = document.getElementById('navModules');
        const glossaryBtn = container.querySelector('.glossary-btn');
        container.innerHTML = '';
        courseData.modules.forEach((mod, i) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            if (i === currentModule) btn.classList.add('active');
            if (progress[i]) btn.classList.add('completed');
            btn.textContent = `М${i+1}`;
            btn.title = mod.title;
            btn.addEventListener('click', () => showModule(i));
            container.appendChild(btn);
        });
        const btn = document.createElement('button');
        btn.className = 'nav-btn glossary-btn';
        btn.textContent = '📖 Глоссарий';
        btn.addEventListener('click', showGlossary);
        container.appendChild(btn);
    }

    function renderModule(index) {
        const container = document.getElementById('modulesContainer');
        const mod = courseData.modules[index];
        
        let tasksHtml = '';
        if (mod.tasks && mod.tasks.length > 0) {
            tasksHtml = mod.tasks.map((task, ti) => `
                <div class="task" id="task-${index}-${ti}">
                    <div class="task-title">${task.title}</div>
                    <div class="task-body">
                        <p>${task.prompt}</p>
                        <textarea id="task-input-${index}-${ti}" placeholder="${task.placeholder || 'Введите ваш ответ...'}"></textarea>
                        <div class="task-actions">
                            <button class="task-btn" onclick="checkTask(${index}, ${ti})">✅ Готово</button>
                            <button class="task-btn-hint" onclick="showHint(${index}, ${ti})">💡 Подсказка</button>
                            <button class="task-btn-save" onclick="saveTask(${index}, ${ti})">💾 Сохранить ответ</button>
                        </div>
                        <div class="task-feedback" id="task-feedback-${index}-${ti}"></div>
                    </div>
                </div>
            `).join('');
        }

        let contentHtml = mod.content;

        container.innerHTML = `
            <div class="module active">
                <div class="module-title">${mod.title}</div>
                <div class="module-sub">${mod.subtitle}</div>
                <div class="module-content">
                    ${contentHtml}
                </div>
                ${tasksHtml}
                <div class="module-nav">
                    <button class="btn btn-prev" onclick="showModule(${index-1})" ${index === 0 ? 'disabled style="opacity:0.4;"' : ''}>← Назад</button>
                    ${index === totalModules - 1 ? `
                        <button class="btn btn-finish" onclick="finishCourse()">🎉 Завершить курс</button>
                    ` : `
                        <button class="btn btn-next" onclick="showModule(${index+1})">Далее →</button>
                    `}
                </div>
            </div>
        `;

        document.getElementById('glossarySection').classList.remove('active');

        if (!progress[index]) {
            progress[index] = true;
            saveProgress();
            renderProgressBar();
            renderNavModules();
            updateProgressPercent();
        }

        if (mod.tasks) {
            mod.tasks.forEach((task, ti) => {
                const saved = localStorage.getItem(`zem_task_${index}_${ti}`);
                const textarea = document.getElementById(`task-input-${index}-${ti}`);
                if (saved && textarea) {
                    textarea.value = saved;
                }
                if (textarea) {
                    textarea.addEventListener('input', function() {
                        localStorage.setItem(`zem_task_${index}_${ti}`, this.value);
                    });
                }
            });
        }

        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showModule(index) {
        if (index < 0 || index >= totalModules) return;
        currentModule = index;
        render();
        if (!progress[index]) {
            progress[index] = true;
            saveProgress();
            renderProgressBar();
            renderNavModules();
            updateProgressPercent();
        }
    }

    function updateProgressPercent() {
        const done = progress.filter(p => p).length;
        const pct = Math.round((done / totalModules) * 100);
        document.getElementById('progressPercent').textContent = pct;
    }

    function renderGlossaryCount() {
        document.getElementById('glossaryCount').textContent = glossaryData.length;
        document.getElementById('glossaryCountDisplay').textContent = `Всего терминов: ${glossaryData.length}`;
    }

    // ============================================================
    // ГЛОССАРИЙ
    // ============================================================

    function showGlossary() {
        document.querySelectorAll('.module').forEach(el => el.classList.remove('active'));
        document.getElementById('modulesContainer').innerHTML = '';
        
        const section = document.getElementById('glossarySection');
        section.classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.progress-dot').forEach(dot => dot.classList.remove('active'));
        
        renderGlossaryList();
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderGlossaryList(filter) {
        const container = document.getElementById('glossaryList');
        const search = filter || document.getElementById('glossarySearch').value || '';
        const filtered = glossaryData.filter(item => 
            item.term.toLowerCase().includes(search.toLowerCase()) ||
            item.definition.toLowerCase().includes(search.toLowerCase())
        );
        
        container.innerHTML = filtered.map((item, index) => `
            <div class="glossary-item" id="glossary-item-${index}">
                <div class="term" onclick="toggleGlossaryTerm(${index})">
                    ${item.term}
                    <button class="term-toggle">▼</button>
                </div>
                <div class="definition" id="glossary-def-${index}">
                    ${item.definition}
                </div>
            </div>
        `).join('');
    }

    function filterGlossary(value) {
        renderGlossaryList(value);
    }

    function toggleGlossaryTerm(index) {
        const def = document.getElementById(`glossary-def-${index}`);
        if (def) {
            def.classList.toggle('open');
            const btn = document.querySelector(`#glossary-item-${index} .term-toggle`);
            if (btn) btn.textContent = def.classList.contains('open') ? '▲' : '▼';
        }
    }

    // ============================================================
    // ЗАДАНИЯ
    // ============================================================

    function showHint(moduleIdx, taskIdx) {
        const mod = courseData.modules[moduleIdx];
        const task = mod.tasks[taskIdx];
        const textarea = document.getElementById(`task-input-${moduleIdx}-${taskIdx}`);
        const feedback = document.getElementById(`task-feedback-${moduleIdx}-${taskIdx}`);

        if (!task.hint) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Для этого задания подсказка не подготовлена.';
            return;
        }

        textarea.value = task.hint;
        textarea.style.background = '#fef9e7';
        textarea.style.borderColor = '#f39c12';

        feedback.className = 'task-feedback show hint';
        feedback.textContent = '💡 Подсказка загружена. Это пример правильного ответа.';

        localStorage.setItem(`zem_task_${moduleIdx}_${taskIdx}`, task.hint);
    }

    function saveTask(moduleIdx, taskIdx) {
        const input = document.getElementById(`task-input-${moduleIdx}-${taskIdx}`);
        const feedback = document.getElementById(`task-feedback-${moduleIdx}-${taskIdx}`);
        const answer = input ? input.value : '';

        if (!answer.trim()) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Поле пустое. Напишите ответ перед сохранением.';
            return;
        }

        const mod = courseData.modules[moduleIdx];
        const task = mod.tasks[taskIdx];
        const date = new Date().toLocaleString('ru-RU');
        
        const content = [
            '═══════════════════════════════════════════',
            `  📝 Ответ на задание: ${task.title}`,
            `  📚 Модуль: ${mod.title}`,
            `  📅 Дата: ${date}`,
            '═══════════════════════════════════════════',
            '',
            '📌 ЗАДАНИЕ:',
            task.prompt,
            '',
            '📝 ОТВЕТ:',
            answer,
            '',
            '═══════════════════════════════════════════',
            '  ✍️ Сохранено с помощью интерактивного курса',
            '  Организация землепользования',
            '═══════════════════════════════════════════'
        ].join('\n');

        try {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            const filename = `otvet_modul${moduleIdx+1}_zadanie${taskIdx+1}.txt`;
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);

            feedback.className = 'task-feedback show success';
            feedback.textContent = `💾 Ответ сохранён в файл "${filename}"`;
        } catch (e) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '❌ Ошибка сохранения: ' + e.message;
        }
    }

    function checkTask(moduleIdx, taskIdx) {
        const input = document.getElementById(`task-input-${moduleIdx}-${taskIdx}`);
        const feedback = document.getElementById(`task-feedback-${moduleIdx}-${taskIdx}`);
        const answer = input ? input.value.trim() : '';

        if (answer.length === 0) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Пожалуйста, напишите ответ перед проверкой.';
            return;
        }

        if (answer.length < 10) {
            feedback.className = 'task-feedback show error';
            feedback.textContent = '⚠️ Ответ слишком короткий. Попробуйте развернуть мысль.';
            return;
        }

        const taskKey = `zem_task_done_${moduleIdx}_${taskIdx}`;
        localStorage.setItem(taskKey, 'true');

        feedback.className = 'task-feedback show success';
        feedback.textContent = '✅ Сохраните ваш ответ.';
        
        checkModuleCompletion(moduleIdx);
    }

    function checkModuleCompletion(moduleIdx) {
        const mod = courseData.modules[moduleIdx];
        if (!mod.tasks) return;
        
        let allDone = true;
        mod.tasks.forEach((task, ti) => {
            const key = `zem_task_done_${moduleIdx}_${ti}`;
            if (!localStorage.getItem(key)) {
                allDone = false;
            }
        });

        if (allDone && mod.tasks.length > 0) {
            progress[moduleIdx] = true;
            saveProgress();
            renderProgressBar();
            renderNavModules();
            updateProgressPercent();
            
            const feedbacks = document.querySelectorAll(`#task-feedback-${moduleIdx}-0`);
            if (feedbacks.length > 0) {
                const lastFeedback = feedbacks[feedbacks.length - 1];
                if (lastFeedback) {
                    const msg = document.createElement('div');
                    msg.style.marginTop = '12px';
                    msg.style.padding = '12px 16px';
                    msg.style.background = '#dff0df';
                    msg.style.borderRadius = '10px';
                    msg.style.color = '#2a6a3a';
                    msg.style.fontWeight = '600';
                    msg.textContent = '🎉 Все задания модуля выполнены! Переходите к следующему.';
                    lastFeedback.parentNode.appendChild(msg);
                }
            }
        }
    }

    function finishCourse() {
        const allDone = progress.every(p => p === true);
        if (!allDone) {
            alert('Вы ещё не прошли все модули. Продолжайте изучение!');
            return;
        }

        if (confirm('🎉 Поздравляем! Вы завершили курс "Организация землепользования".\n\nХотите сбросить прогресс и пройти заново?')) {
            let allAnswers = '';
            for (let m = 0; m < totalModules; m++) {
                const mod = courseData.modules[m];
                if (mod.tasks) {
                    mod.tasks.forEach((task, ti) => {
                        const saved = localStorage.getItem(`zem_task_${m}_${ti}`);
                        if (saved) {
                            allAnswers += `\n--- Модуль ${m+1}, Задание ${ti+1} ---\n${saved}\n`;
                        }
                    });
                }
            }
            if (allAnswers) {
                const blob = new Blob(['ВСЕ ОТВЕТЫ НА КУРС\n' + '='.repeat(40) + '\n' + allAnswers], { type: 'text/plain;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'vse_otvety_zem_kursa.txt';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
            }
            
            localStorage.clear();
            progress = new Array(totalModules).fill(false);
            saveProgress();
            render();
            alert('Прогресс сброшен. Можете начать заново!');
        }
    }

    // ============================================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================================

    loadProgress();
    render();

    console.log('📚 Курс "Организация землепользования" загружен');
    console.log(`📖 Всего модулей: ${totalModules}`);
    console.log(`📝 Выполнено: ${progress.filter(p => p).length}/${totalModules}`);
    console.log(`📖 Глоссарий: ${glossaryData.length} терминов`);
</script>

</body>
</html>
